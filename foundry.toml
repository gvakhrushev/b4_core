[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
fuzz = { runs = 512 }
invariant = { runs = 64, depth = 64, fail_on_revert = false }

# Nightly deep profile for invariant campaigns (TEST_PLAN §1):
#   FOUNDRY_PROFILE=deep forge test --match-path 'test/invariant/*'
[profile.deep]
fuzz = { runs = 4096 }
invariant = { runs = 512, depth = 256, fail_on_revert = false }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
